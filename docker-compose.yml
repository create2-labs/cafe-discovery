# Local use only. Staging/production are deployed from cafe-deploy.
# Base Compose file: run with docker-compose.dev.yml for local dev (build + ports).
services:
  cafe-discovery-backend:
    container_name: cafe-discovery-backend
    restart: unless-stopped
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=cafe
      - POSTGRES_USER=${POSTGRES_USER:-cafe}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cafe}
      - POSTGRES_SSLMODE=disable
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-}
      - MORALIS_API_KEY=${MORALIS_API_KEY}
      - MORALIS_API_URL=${MORALIS_API_URL:-https://deep-index.moralis.io}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - cafe-infra_observability
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  cafe-infra_observability:
    external: true
