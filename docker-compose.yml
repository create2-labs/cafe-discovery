services:
  postgres:
    image: postgres:16-alpine
    container_name: cafe-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-cafe}
      POSTGRES_USER: ${POSTGRES_USER:-cafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cafe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cafe}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    container_name: cafe-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"  # Monitoring port
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: [ "CMD", "nats", "server", "check", "--healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cafe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:


