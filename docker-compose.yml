version: '3.8'

# IMPORTANT: Before building the services with docker compose, you must first build the OQS base image:
#   See Step 1 in README.md for instructions on building from cafe-infra/oqs
#   The image must be tagged as oqs:dev for compatibility

services:
  # Cafe Discovery API Server
  cafe-discovery-backend:
    build:
      context: .
      dockerfile: Dockerfile-discovery-backend
    container_name: cafe-discovery-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Server configuration
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      
      # PostgreSQL (using cafe-infra service names)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=cafe
      - POSTGRES_USER=${POSTGRES_USER:-cafe}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cafe}
      - POSTGRES_SSLMODE=disable
      
      # NATS (using cafe-infra service names)
      - NATS_URL=nats://nats:4222
      
      # Redis (using cafe-infra service names)
      - REDIS_URL=redis://redis:6379
      
      # JWT configuration (required)
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      
      # Moralis API (required for wallet scanning)
      - MORALIS_API_KEY=${MORALIS_API_KEY}
      - MORALIS_API_URL=${MORALIS_API_URL:-https://deep-index.moralis.io}
      
      # Cloudflare Turnstile (optional, uses dev keys by default)
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      
      # Configuration file path
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - cafe-infra_observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Cafe Discovery Worker
  cafe-discovery-worker:
    build:
      context: .
      dockerfile: Dockerfile-discovery-worker
    container_name: cafe-discovery-worker
    restart: unless-stopped
    environment:
      # Worker health check port
      - WORKER_HEALTH_PORT=8081
      
      # PostgreSQL (using cafe-infra service names)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=cafe
      - POSTGRES_USER=${POSTGRES_USER:-cafe}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cafe}
      - POSTGRES_SSLMODE=disable
      
      # NATS (using cafe-infra service names)
      - NATS_URL=nats://nats:4222
      
      # Redis (using cafe-infra service names)
      - REDIS_URL=redis://redis:6379
      
      # JWT configuration (required)
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      
      # Moralis API (required for wallet scanning)
      - MORALIS_API_KEY=${MORALIS_API_KEY}
      - MORALIS_API_URL=${MORALIS_API_URL:-https://deep-index.moralis.io}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
      # Configuration file path
      - CONFIG_PATH=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - cafe-infra_observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  cafe-infra_observability:
    external: true
