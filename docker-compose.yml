services:
  cafe-db:
    image: mysql:latest
    container_name: cafe-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-cafe}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cafe}
      MYSQL_USER: ${MYSQL_USER:-cafe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cafe}
    volumes:
      - cafe_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cafe_data:


