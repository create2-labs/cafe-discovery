name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout sources
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Docker / Buildx
      # ------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================================
      # BACKEND
      # ============================================================
      - name: Build backend CI image
        run: |
          set -euo pipefail
          docker build \
            --target ci \
            -f Dockerfile-discovery-backend \
            -t cafe-discovery-backend:ci .

      - name: Run backend CI checks (inside CI image)
        run: |
          docker run --rm cafe-discovery-backend:ci

      # ============================================================
      # WORKER
      # ============================================================
      - name: Build worker CI image
        run: |
          set -euo pipefail
          docker build \
            --target ci \
            -f Dockerfile-discovery-worker \
            -t cafe-discovery-worker:ci .

      - name: Run worker CI checks (inside CI image)
        run: |
          docker run --rm cafe-discovery-worker:ci
