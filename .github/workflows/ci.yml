name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------- Backend ----------------
      - name: Build backend CI image
        run: |
          docker build \
            -f Dockerfile-discovery-backend \
            --target ci \
            -t cafe-discovery-backend:ci .

      - name: Run backend CI checks (inside image)
        run: |
          docker run --rm cafe-discovery-backend:ci

      # ---------------- Worker ----------------
      - name: Build worker CI image
        run: |
          docker build \
            -f Dockerfile-discovery-worker \
            --target ci \
            -t cafe-discovery-worker:ci .

      - name: Run worker CI checks (inside image)
        run: |
          docker run --rm cafe-discovery-worker:ci
