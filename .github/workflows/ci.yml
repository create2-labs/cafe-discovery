name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # Checkout (images built with --target ci only; not pushed)
      # ------------------------------------------------------------
      - name: Checkout sources
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Docker / Buildx
      # ------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================================
      # BACKEND
      # ============================================================
      - name: Build backend CI image
        run: |
          set -euo pipefail
          docker build \
            --target ci \
            -f Dockerfile-discovery-backend \
            -t cafe-discovery-backend:ci .

      - name: Run backend CI checks (inside CI image)
        run: |
          docker run --rm cafe-discovery-backend:ci

      # ============================================================
      # SCANNER (TLS)
      # ============================================================
      - name: Build scanner-tls CI image
        run: |
          set -euo pipefail
          docker build \
            --target ci \
            -f Dockerfile-discovery-scanner-tls \
            -t cafe-discovery-scanner-tls:ci .

      - name: Run scanner-tls CI checks (inside CI image)
        run: |
          docker run --rm cafe-discovery-scanner-tls:ci

