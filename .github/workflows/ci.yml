name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout sources
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Docker / Buildx
      # ------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================================
      # BACKEND
      # ============================================================
      - name: Build backend builder image
        run: |
          set -euo pipefail
          docker build \
            --target builder \
            -f Dockerfile-discovery-backend \
            -t cafe-discovery-backend:builder .

      - name: Run backend CI checks (inside builder image)
        run: |
          set -euo pipefail
          docker run --rm cafe-discovery-backend:builder bash -lc "
            go version &&
            go mod download &&
            golangci-lint run ./... &&
            go test ./... &&
            govulncheck ./...
          "

      # ============================================================
      # WORKER
      # ============================================================
      - name: Build worker builder image
        run: |
          set -euo pipefail
          docker build \
            --target builder \
            -f Dockerfile-discovery-worker \
            -t cafe-discovery-worker:builder .

      - name: Run worker CI checks (inside builder image)
        run: |
          set -euo pipefail
          docker run --rm cafe-discovery-worker:builder bash -lc "
            go version &&
            go mod download &&
            golangci-lint run ./... &&
            go test ./... &&
            govulncheck ./...
          "
