name: golang tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  GO_VERSION: "1.25"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        run: go mod tidy

      - name: Run Linter
        uses: golangci/golangci-lint-action@v9

      - name: Run unit-tests
        run: go test -v ./...
