name: Docker Build on Label

on:
  issues:
    types:
      - labeled
  pull_request:
    types:
      - labeled

permissions:
  contents: read

env:
  CGO_ENABLED: "1"
  DOCKER_BUILDKIT: "1"

jobs:
  build-on-label:
    runs-on: ubuntu-latest
    if: |
      (github.event.action == 'labeled' && 
       (contains(github.event.label.name, 'build') || 
        contains(github.event.label.name, 'deploy') ||
        contains(github.event.label.name, 'release')))

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # Docker / Buildx setup
      # ------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------------------------------------------------
      # Version extraction
      # ------------------------------------------------------------
      - name: Extract version from Git tag or commit
        id: version
        run: |
          git fetch --tags --force || true

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [[ -n "$LATEST_TAG" ]]; then
            TAG="$LATEST_TAG"
            VERSION=${TAG#v}
            APP_VERSION="$TAG"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            APP_VERSION="dev-$SHORT_SHA"
            TAG=""
            VERSION=""
          fi

          if [[ -n "$VERSION" ]]; then
            MINOR_VERSION=$(echo "$VERSION" | cut -d. -f1,2)
            MINOR_TAG="v$MINOR_VERSION"
          else
            MINOR_TAG=""
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)

          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$TAG" >> $GITHUB_OUTPUT
          echo "minor_version=$MINOR_TAG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # Build images LOCALLY (amd64 only) for security scanning
      # ------------------------------------------------------------
      - name: Build discovery-backend image (local, amd64, for scan)
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg APP_VERSION="${{ steps.version.outputs.app_version }}" \
            -f Dockerfile-discovery-backend \
            -t oleglod/cafe-discovery-backend:scan-local .

      - name: Build discovery-worker image (local, amd64, for scan)
        run: |
          docker build \
            --platform linux/amd64 \
            -f Dockerfile-discovery-worker \
            -t oleglod/cafe-discovery-worker:scan-local .

      # ------------------------------------------------------------
      # Docker Scout installation
      # ------------------------------------------------------------
      - name: Install Docker Scout CLI
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh
          echo "$HOME/.docker/cli-plugins" >> $GITHUB_PATH
          docker scout version

      # ------------------------------------------------------------
      # Security scan (BLOCKING)
      # ------------------------------------------------------------
      - name: Scan discovery-backend image with Docker Scout
        run: |
          docker scout cves oleglod/cafe-discovery-backend:scan-local \
            --only-severity critical,high \
            --exit-code

      - name: Scan discovery-worker image with Docker Scout
        run: |
          docker scout cves oleglod/cafe-discovery-worker:scan-local \
            --only-severity critical,high \
            --exit-code

      # ------------------------------------------------------------
      # Build & publish images (amd64 only, with CACHE)
      # ------------------------------------------------------------
      - name: Build & publish discovery-backend image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg APP_VERSION="${{ steps.version.outputs.app_version }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f Dockerfile-discovery-backend \
            -t oleglod/cafe-discovery-backend:${{ steps.version.outputs.full_version }} \
            -t oleglod/cafe-discovery-backend:${{ steps.version.outputs.minor_version }} \
            -t oleglod/cafe-discovery-backend:sha-${{ steps.version.outputs.short_sha }} \
            -t oleglod/cafe-discovery-backend:build \
            --push .

      - name: Build & publish discovery-worker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f Dockerfile-discovery-worker \
            -t oleglod/cafe-discovery-worker:${{ steps.version.outputs.full_version }} \
            -t oleglod/cafe-discovery-worker:${{ steps.version.outputs.minor_version }} \
            -t oleglod/cafe-discovery-worker:sha-${{ steps.version.outputs.short_sha }} \
            -t oleglod/cafe-discovery-worker:build \
            --push .