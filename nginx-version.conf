# NGINX config for discovery backend: serve /version on port 8082 (Docker network only).
# Main API is the Go server on 8080; this is only for the version endpoint.
#
# Version flow:
# - GitHub Action (on tag) sets APP_VERSION → Dockerfile writes /usr/share/nginx/html/version.json
# - This config serves GET /version → version.json (format: {"version": "vX.Y.Z"})
# - cafe-deploy nginx proxies /api/version → http://cafe-discovery-backend:8082/version
# - Frontend (platformService.getBackendVersion()) calls api.get('/version') → displays discovery version
# Do not change the response format; frontend and infra rely on {"version": "..."}.
worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 64;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 8082;
        server_name localhost;
        root /usr/share/nginx/html;

        location /version {
            alias /usr/share/nginx/html/version.json;
            add_header Cache-Control "no-store";
        }

        location / {
            return 404;
        }
    }
}
