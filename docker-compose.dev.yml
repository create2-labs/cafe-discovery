# Local use only. Use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Staging/production are deployed from cafe-deploy.
services:
  cafe-discovery-backend:
    build:
      context: .
      dockerfile: Dockerfile-discovery-backend
      target: runtime
    ports:
      - "8080:8080"

  cafe-discovery-scanner-tls:
    build:
      context: .
      dockerfile: Dockerfile-discovery-scanner-tls
      target: runtime
    ports:
      - "8081:8081"

  cafe-discovery-scanner-wallet:
    build:
      context: .
      dockerfile: Dockerfile-discovery-scanner-wallet
      target: runtime
    ports:
      - "8082:8081"
